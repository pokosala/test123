<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Тест</title>
</head>
<body>
    <h1>Тестовая страница</h1>
    <button onclick="testCreate()">📝 Тест создания комнаты</button>
    <button onclick="testRandom()">🎲 Тест случайного поиска</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function testCreate() {
            tg.sendData(JSON.stringify({
                action: 'create_room',
                name: 'Тестовая комната',
                description: 'Создано для теста',
                category: 'other',
                maxUsers: 10
            }));
            alert('Данные отправлены!');
        }

        function testRandom() {
            tg.sendData(JSON.stringify({
                action: 'random_search'
            }));
            alert('Поиск запущен!');
        }
    </script>
</body>
</html>
