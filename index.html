
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форум - Анонимное общение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--tg-theme-bg-color, #0a0c10);
            color: var(--tg-theme-text-color, #e4e6eb);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--tg-theme-secondary-bg-color, #16181c);
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid var(--tg-theme-hint-color, #2a2f35);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--tg-theme-button-color, #2b6bff);
        }

        .header p {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #8e8e93);
        }

        .nav {
            display: flex;
            background: var(--tg-theme-secondary-bg-color, #16181c);
            padding: 8px;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            border-bottom: 1px solid var(--tg-theme-hint-color, #2a2f35);
        }

        .nav::-webkit-scrollbar {
            display: none;
        }

        .nav-item {
            padding: 8px 16px;
            background: var(--tg-theme-bg-color, #0a0c10);
            border: 1px solid var(--tg-theme-hint-color, #2a2f35);
            border-radius: 20px;
            font-size: 14px;
            color: var(--tg-theme-text-color, #e4e6eb);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .nav-item.active {
            background: var(--tg-theme-button-color, #2b6bff);
            color: var(--tg-theme-button-text-color, #ffffff);
            border-color: var(--tg-theme-button-color, #2b6bff);
        }

        .nav-item.random {
            background: #8e44ad;
            border-color: #9b59b6;
            color: white;
        }

        .main {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--tg-theme-secondary-bg-color, #16181c);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            border: 1px solid var(--tg-theme-hint-color, #2a2f35);
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--tg-theme-button-color, #2b6bff);
        }

        .stat-label {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #8e8e93);
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .category-card {
            background: var(--tg-theme-secondary-bg-color, #16181c);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border: 1px solid var(--tg-theme-hint-color, #2a2f35);
            transition: transform 0.2s;
        }

        .category-card:hover {
            transform: scale(1.05);
        }

        .category-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .category-name {
            font-size: 12px;
            font-weight: 500;
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 12px 0;
        }

        .section-title h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .section-title button {
            background: var(--tg-theme-button-color, #2b6bff);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
        }

        .rooms-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .room-card {
            background: var(--tg-theme-secondary-bg-color, #16181c);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--tg-theme-hint-color, #2a2f35);
            cursor: pointer;
            transition: background 0.2s;
        }

        .room-card:hover {
            background: #1e2228;
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .room-name {
            font-size: 16px;
            font-weight: 600;
        }

        .room-category {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #8e8e93);
        }

        .room-description {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #8e8e93);
            margin-bottom: 12px;
        }

        .room-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .room-users {
            background: var(--tg-theme-bg-color, #0a0c10);
            padding: 4px 8px;
            border-radius: 12px;
            color: var(--tg-theme-button-color, #2b6bff);
        }

        .full-badge {
            background: #e74c3c;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
        }

        .create-form {
            background: var(--tg-theme-secondary-bg-color, #16181c);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--tg-theme-hint-color, #2a2f35);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #8e8e93);
        }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 12px;
            background: var(--tg-theme-bg-color, #0a0c10);
            border: 1px solid var(--tg-theme-hint-color, #2a2f35);
            border-radius: 12px;
            color: var(--tg-theme-text-color, #e4e6eb);
            font-size: 14px;
        }

        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }

        .limit-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .limit-btn {
            padding: 12px;
            background: var(--tg-theme-bg-color, #0a0c10);
            border: 1px solid var(--tg-theme-hint-color, #2a2f35);
            border-radius: 12px;
            color: var(--tg-theme-text-color, #e4e6eb);
            font-size: 14px;
            cursor: pointer;
            text-align: center;
        }

        .limit-btn.selected {
            background: var(--tg-theme-button-color, #2b6bff);
            color: white;
            border-color: var(--tg-theme-button-color, #2b6bff);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--tg-theme-button-color, #2b6bff);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        .chat-container {
            background: var(--tg-theme-secondary-bg-color, #16181c);
            border-radius: 16px;
            padding: 16px;
            min-height: 400px;
            margin-bottom: 16px;
            border: 1px solid var(--tg-theme-hint-color, #2a2f35);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            padding: 12px;
            background: var(--tg-theme-bg-color, #0a0c10);
            border-radius: 16px;
            max-width: 80%;
            border: 1px solid var(--tg-theme-hint-color, #2a2f35);
            align-self: flex-start;
        }

        .message.own {
            margin-left: auto;
            background: var(--tg-theme-button-color, #2b6bff);
            color: white;
            border: none;
            align-self: flex-end;
        }

        .message.system {
            background: transparent;
            border: none;
            text-align: center;
            color: var(--tg-theme-hint-color, #8e8e93);
            font-style: italic;
            max-width: 100%;
        }

        .message-header {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #8e8e93);
            margin-bottom: 4px;
        }

        .message.own .message-header {
            color: rgba(255, 255, 255, 0.7);
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
            position: sticky;
            bottom: 0;
            background: var(--tg-theme-bg-color, #0a0c10);
            padding: 12px;
            border-top: 1px solid var(--tg-theme-hint-color, #2a2f35);
        }

        .chat-input {
            flex: 1;
            background: var(--tg-theme-secondary-bg-color, #16181c);
            color: var(--tg-theme-text-color, #e4e6eb);
            border: 1px solid var(--tg-theme-hint-color, #2a2f35);
            border-radius: 24px;
            padding: 12px 16px;
            font-size: 14px;
        }

        .chat-send {
            background: var(--tg-theme-button-color, #2b6bff);
            color: white;
            border: none;
            border-radius: 24px;
            padding: 12px 24px;
            font-size: 14px;
            cursor: pointer;
        }

        .chat-gpt {
            background: #8e44ad;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 12px 16px;
            font-size: 14px;
            cursor: pointer;
        }

        .private-section {
            background: var(--tg-theme-secondary-bg-color, #16181c);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--tg-theme-hint-color, #2a2f35);
        }

        .private-input {
            display: flex;
            gap: 8px;
            margin: 16px 0;
        }

        .private-input input {
            flex: 1;
            padding: 12px;
            background: var(--tg-theme-bg-color, #0a0c10);
            border: 1px solid var(--tg-theme-hint-color, #2a2f35);
            border-radius: 12px;
            color: var(--tg-theme-text-color, #e4e6eb);
        }

        .invite-link {
            background: var(--tg-theme-bg-color, #0a0c10);
            border: 1px solid var(--tg-theme-hint-color, #2a2f35);
            border-radius: 12px;
            padding: 12px;
            margin-top: 16px;
            word-break: break-all;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #8e8e93);
        }

        .back-button {
            margin-bottom: 16px;
        }

        .back-btn {
            background: var(--tg-theme-secondary-bg-color, #16181c);
            border: 1px solid var(--tg-theme-hint-color, #2a2f35);
            border-radius: 12px;
            padding: 8px 16px;
            color: var(--tg-theme-text-color, #e4e6eb);
            cursor: pointer;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #8e8e93);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 Форум</h1>
        <p>Анонимное общение по интересам</p>
    </div>

    <div class="nav" id="nav">
        <div class="nav-item active" onclick="showSection('main')">🏠 Главная</div>
        <div class="nav-item" onclick="showSection('categories')">📂 Категории</div>
        <div class="nav-item" onclick="showSection('create')">➕ Создать</div>
        <div class="nav-item" onclick="showSection('private')">🔐 Приватное</div>
        <div class="nav-item random" onclick="randomSearch()">🎲 Случайный</div>
    </div>

    <div class="main" id="mainContent">
        <div id="mainSection">
            <div class="stats" id="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalRooms">0</div>
                    <div class="stat-label">Комнат</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalUsers">0</div>
                    <div class="stat-label">Участников</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="onlineNow">0</div>
                    <div class="stat-label">Онлайн</div>
                </div>
            </div>

            <div class="section-title">
                <h2>🔥 Популярные комнаты</h2>
                <button onclick="showSection('categories')">Все →</button>
            </div>

            <div class="rooms-list" id="popularRooms"></div>

            <div class="section-title">
                <h2>✨ Новые комнаты</h2>
            </div>

            <div class="rooms-list" id="newRooms"></div>
        </div>

        <div id="categoriesSection" class="hidden">
            <div class="back-button">
                <button class="back-btn" onclick="showSection('main')">← На главную</button>
            </div>

            <div class="categories-grid" id="categoriesGrid"></div>

            <div id="categoryRooms" class="hidden">
                <div class="section-title">
                    <h2 id="selectedCategoryName">Комнаты</h2>
                </div>
                <div class="rooms-list" id="categoryRoomsList"></div>
            </div>
        </div>

        <div id="createSection" class="hidden">
            <div class="back-button">
                <button class="back-btn" onclick="showSection('main')">← На главную</button>
            </div>

            <div class="create-form">
                <h2 style="margin-bottom: 20px;">➕ Создать комнату</h2>

                <div class="form-group">
                    <label class="form-label">Категория</label>
                    <select class="form-select" id="roomCategory">
                        <option value="games">🎮 Игры</option>
                        <option value="it">💻 IT и технологии</option>
                        <option value="movies">🎬 Кино</option>
                        <option value="books">📚 Книги</option>
                        <option value="auto">🚗 Авто</option>
                        <option value="music">🎵 Музыка</option>
                        <option value="sport">⚽ Спорт</option>
                        <option value="other">🔮 Другое</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Название комнаты</label>
                    <input type="text" class="form-input" id="roomName" placeholder="Например: Фанаты Dark Souls" maxlength="50">
                </div>

                <div class="form-group">
                    <label class="form-label">Описание</label>
                    <textarea class="form-textarea" id="roomDescription" placeholder="О чем будете общаться?" maxlength="200"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Максимум участников</label>
                    <div class="limit-buttons">
                        <div class="limit-btn" onclick="selectLimit(2, this)">👥 2</div>
                        <div class="limit-btn" onclick="selectLimit(5, this)">👥 5</div>
                        <div class="limit-btn selected" onclick="selectLimit(10, this)">👥 10</div>
                        <div class="limit-btn" onclick="selectLimit(50, this)">👥 50</div>
                        <div class="limit-btn" onclick="selectLimit(100, this)">👥 100</div>
                        <div class="limit-btn" onclick="selectLimit(999, this)">♾️ Без лимита</div>
                    </div>
                </div>

                <button class="submit-btn" onclick="createRoom()">🚀 Создать комнату</button>
            </div>
        </div>

        <div id="privateSection" class="hidden">
            <div class="back-button">
                <button class="back-btn" onclick="showSection('main')">← На главную</button>
            </div>

            <div class="private-section">
                <h2 style="margin-bottom: 16px;">🔐 Приватные комнаты</h2>

                <button class="submit-btn" onclick="createPrivateRoom()" style="margin-bottom: 20px;">
                    ✨ Создать приватную комнату
                </button>

                <div class="form-group">
                    <label class="form-label">Войти по приглашению</label>
                    <div class="private-input">
                        <input type="text" id="inviteCode" placeholder="Введите код">
                        <button class="submit-btn" onclick="joinPrivateRoom()" style="width: auto; margin: 0;">Войти</button>
                    </div>
                </div>

                <div id="inviteLinkContainer" class="hidden">
                    <div class="invite-link" id="inviteLink"></div>
                    <button class="submit-btn" onclick="copyInviteLink()" style="margin-top: 12px;">📋 Скопировать ссылку</button>
                </div>
            </div>
        </div>

        <div id="chatSection" class="hidden">
            <div class="back-button">
                <button class="back-btn" onclick="leaveRoom()">← Выйти из комнаты</button>
            </div>

            <div style="margin-bottom: 12px;" id="roomInfo">
                <h2 id="chatRoomName"></h2>
                <p id="chatRoomUsers"></p>
            </div>

            <div class="chat-container" id="messages"></div>

            <div class="chat-input-area">
                <input type="text" class="chat-input" id="messageInput" placeholder="Сообщение...">
                <button class="chat-gpt" onclick="askGPT()">🤖 GPT</button>
                <button class="chat-send" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        let currentSection = 'main';
        let selectedCategory = null;
        let selectedLimit = 10;
        let currentRoom = null;
        let rooms = [];
        let categories = [
            { id: 'games', name: 'Игры', icon: '🎮', count: 0 },
            { id: 'it', name: 'IT', icon: '💻', count: 0 },
            { id: 'movies', name: 'Кино', icon: '🎬', count: 0 },
            { id: 'books', name: 'Книги', icon: '📚', count: 0 },
            { id: 'auto', name: 'Авто', icon: '🚗', count: 0 },
            { id: 'music', name: 'Музыка', icon: '🎵', count: 0 },
            { id: 'sport', name: 'Спорт', icon: '⚽', count: 0 },
            { id: 'other', name: 'Другое', icon: '🔮', count: 0 }
        ];

        // Обработка сообщений от бота
        Telegram.WebApp.onEvent('message', function(event) {
            try {
                const data = JSON.parse(event.data);
                
                if (data.rooms) {
                    // Получили список комнат
                    rooms = data.rooms;
                    renderAll();
                }
                
                if (data.action === 'random_found') {
                    // Нашли собеседника!
                    currentRoom = data.room;
                    document.getElementById('chatRoomName').textContent = currentRoom.name;
                    document.getElementById('chatRoomUsers').textContent = `👥 ${currentRoom.users}/${currentRoom.maxUsers}`;
                    document.getElementById('messages').innerHTML = '';
                    addSystemMessage('✅ Собеседник найден! Можете общаться.');
                }
                
                if (data.action === 'random_searching') {
                    addSystemMessage(data.message);
                }
                
                if (data.action === 'random_timeout') {
                    addSystemMessage('⏰ ' + data.message);
                    setTimeout(() => {
                        showSection('main');
                    }, 2000);
                }
                
                if (data.action === 'random_error') {
                    addSystemMessage('❌ ' + data.message);
                    setTimeout(() => {
                        showSection('main');
                    }, 2000);
                }
                
                if (data.success && data.room_id) {
                    // Комната создана, обновляем список
                    loadRooms();
                }
                
            } catch (e) {
                console.log('Received message:', event.data);
            }
        });

        // Загрузка комнат из бота
        function loadRooms() {
            tg.sendData(JSON.stringify({action: 'get_rooms'}));
        }

        function renderAll() {
            renderCategories();
            renderRooms();
            updateStats();
        }

        function updateStats() {
            document.getElementById('totalRooms').textContent = rooms.length;
            const totalUsers = rooms.reduce((sum, r) => sum + (r.users || 0), 0);
            document.getElementById('totalUsers').textContent = totalUsers;
            document.getElementById('onlineNow').textContent = totalUsers;
        }

        function renderCategories() {
            const grid = document.getElementById('categoriesGrid');
            if (!grid) return;
            
            grid.innerHTML = '';
            
            categories.forEach(cat => {
                const count = rooms.filter(r => r.category === cat.id).length;
                cat.count = count;
                
                const card = document.createElement('div');
                card.className = 'category-card';
                card.onclick = () => showCategory(cat.id);
                card.innerHTML = `
                    <div class="category-icon">${cat.icon}</div>
                    <div class="category-name">${cat.name}</div>
                    <div style="font-size: 10px; color: var(--tg-theme-hint-color);">${count} комн.</div>
                `;
                grid.appendChild(card);
            });
        }

        function renderRooms() {
            const popular = document.getElementById('popularRooms');
            if (popular) {
                popular.innerHTML = '';
                if (rooms.length === 0) {
                    popular.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--tg-theme-hint-color);">🚀 Пока нет комнат<br><small>Создай первую!</small></div>';
                } else {
                    rooms.slice(0, 3).forEach(room => {
                        popular.appendChild(createRoomCard(room));
                    });
                }
            }

            const newRooms = document.getElementById('newRooms');
            if (newRooms) {
                newRooms.innerHTML = '';
                if (rooms.length > 3) {
                    rooms.slice(-2).forEach(room => {
                        newRooms.appendChild(createRoomCard(room));
                    });
                }
            }
        }

        function createRoomCard(room) {
            const card = document.createElement('div');
            card.className = 'room-card';
            card.onclick = () => enterRoom(room.id);
            
            const isFull = room.users >= room.maxUsers && room.maxUsers !== 999;
            
            card.innerHTML = `
                <div class="room-header">
                    <span class="room-name">${room.name}</span>
                    <span class="room-category">${room.categoryName || room.category}</span>
                </div>
                <div class="room-description">${room.description || ''}</div>
                <div class="room-footer">
                    <span class="room-users">👥 ${room.users || 0}/${room.maxUsers === 999 ? '∞' : room.maxUsers}</span>
                    ${isFull ? '<span class="full-badge">Полная</span>' : ''}
                </div>
            `;
            return card;
        }

        function showCategory(categoryId) {
            selectedCategory = categoryId;
            const category = categories.find(c => c.id === categoryId);
            
            document.getElementById('selectedCategoryName').textContent = `${category.icon} ${category.name}`;
            
            const categoryRooms = rooms.filter(r => r.category === categoryId);
            const list = document.getElementById('categoryRoomsList');
            list.innerHTML = '';
            
            if (categoryRooms.length === 0) {
                list.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--tg-theme-hint-color);">Пока нет комнат в этой категории<br><small>Создай первую!</small></div>';
            } else {
                categoryRooms.forEach(room => {
                    list.appendChild(createRoomCard(room));
                });
            }
            
            document.getElementById('categoryRooms').classList.remove('hidden');
            showSection('categories');
        }

        function selectLimit(limit, element) {
            selectedLimit = limit;
            document.querySelectorAll('.limit-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            element.classList.add('selected');
        }

        function createRoom() {
            const name = document.getElementById('roomName').value.trim();
            const description = document.getElementById('roomDescription').value.trim();
            const category = document.getElementById('roomCategory').value;
            
            if (!name || !description) {
                tg.showPopup({
                    title: '❌ Ошибка',
                    message: 'Заполни название и описание',
                    buttons: [{type: 'ok'}]
                });
                return;
            }
            
            tg.sendData(JSON.stringify({
                action: 'create_room',
                name: name,
                description: description,
                category: category,
                maxUsers: selectedLimit
            }));
            
            tg.showPopup({
                title: '✅ Комната создается',
                message: 'Подожди секунду...',
                buttons: [{type: 'ok'}]
            });
            
            document.getElementById('roomName').value = '';
            document.getElementById('roomDescription').value = '';
            
            setTimeout(() => {
                showSection('main');
            }, 1000);
        }

        function enterRoom(roomId) {
            const room = rooms.find(r => r.id === roomId);
            if (!room) return;
            
            if (room.users >= room.maxUsers && room.maxUsers !== 999) {
                tg.showPopup({
                    title: '❌ Комната полная',
                    message: `В комнате уже ${room.users} человек (максимум ${room.maxUsers})`,
                    buttons: [{type: 'ok'}]
                });
                return;
            }
            
            tg.sendData(JSON.stringify({
                action: 'join_room',
                roomId: roomId
            }));
            
            currentRoom = room;
            document.getElementById('chatRoomName').textContent = room.name;
            document.getElementById('chatRoomUsers').textContent = `👥 ${room.users || 0}/${room.maxUsers === 999 ? '∞' : room.maxUsers}`;
            
            document.getElementById('messages').innerHTML = '';
            addSystemMessage(`Ты вошел в комнату "${room.name}"`);
            
            showSection('chat');
        }

        function addSystemMessage(text) {
            const container = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message system';
            msgDiv.textContent = text;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentRoom) return;
            
            addMessage('Ты', text, true);
            
            tg.sendData(JSON.stringify({
                action: 'send_message',
                roomId: currentRoom.id,
                text: text
            }));
            
            input.value = '';
        }

        function addMessage(sender, text, isOwn = false) {
            const container = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isOwn ? 'own' : ''}`;
            
            if (!isOwn && sender !== 'system') {
                const header = document.createElement('div');
                header.className = 'message-header';
                header.textContent = sender;
                msgDiv.appendChild(header);
            }
            
            const content = document.createElement('div');
            content.className = 'message-text';
            content.textContent = text;
            msgDiv.appendChild(content);
            
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        function askGPT() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) {
                tg.showPopup({
                    title: '🤖 GPT',
                    message: 'Напиши вопрос в поле сообщения',
                    buttons: [{type: 'ok'}]
                });
                return;
            }
            
            addMessage('Ты', text, true);
            
            tg.sendData(JSON.stringify({
                action: 'ask_gpt',
                roomId: currentRoom.id,
                query: text
            }));
            
            input.value = '';
            addSystemMessage('🤔 GPT думает...');
        }

        function leaveRoom() {
            if (currentRoom) {
                tg.sendData(JSON.stringify({
                    action: 'leave_room',
                    roomId: currentRoom.id
                }));
                
                addSystemMessage('Ты покинул комнату');
                setTimeout(() => {
                    document.getElementById('messages').innerHTML = '';
                    currentRoom = null;
                    showSection('main');
                    loadRooms();
                }, 1000);
            } else {
                showSection('main');
            }
        }

        function randomSearch() {
            // Отправляем запрос на поиск
            tg.sendData(JSON.stringify({
                action: 'random_search'
            }));
            
            // Показываем ожидание
            showSection('chat');
            document.getElementById('chatRoomName').textContent = '🔍 Поиск собеседника';
            document.getElementById('chatRoomUsers').textContent = '⏳ Ожидание...';
            document.getElementById('messages').innerHTML = '';
            addSystemMessage('🔍 Ищем случайного собеседника...');
            addSystemMessage('⏳ Это может занять несколько секунд');
            
            // Устанавливаем таймаут
            setTimeout(() => {
                if (currentRoom && currentRoom.name === '🔍 Поиск собеседника') {
                    addSystemMessage('❌ Время ожидания истекло. Попробуй еще раз!');
                    setTimeout(() => {
                        showSection('main');
                    }, 2000);
                }
            }, 35000);
        }

        function createPrivateRoom() {
            const code = 'room_' + Math.random().toString(36).substring(2, 10);
            
            tg.sendData(JSON.stringify({
                action: 'create_private',
                code: code
            }));
            
            const inviteLink = `https://t.me/your_bot?start=${code}`;
            document.getElementById('inviteLink').textContent = inviteLink;
            document.getElementById('inviteLinkContainer').classList.remove('hidden');
            
            tg.showPopup({
                title: '✅ Приватная комната создана',
                message: 'Отправь ссылку друзьям',
                buttons: [{type: 'ok'}]
            });
        }

        function joinPrivateRoom() {
            const code = document.getElementById('inviteCode').value.trim();
            if (!code) {
                tg.showPopup({
                    title: '❌ Ошибка',
                    message: 'Введи код приглашения',
                    buttons: [{type: 'ok'}]
                });
                return;
            }
            
            tg.sendData(JSON.stringify({
                action: 'join_private',
                code: code
            }));
        }

        function copyInviteLink() {
            const link = document.getElementById('inviteLink').textContent;
            navigator.clipboard.writeText(link);
            tg.showPopup({
                title: '✅ Скопировано',
                message: 'Ссылка скопирована',
                buttons: [{type: 'ok'}]
            });
        }

        function showSection(section) {
            currentSection = section;
            
            document.getElementById('mainSection').classList.add('hidden');
            document.getElementById('categoriesSection').classList.add('hidden');
            document.getElementById('createSection').classList.add('hidden');
            document.getElementById('privateSection').classList.add('hidden');
            document.getElementById('chatSection').classList.add('hidden');
            
            document.getElementById(section + 'Section').classList.remove('hidden');
            
            if (section !== 'categories') {
                document.getElementById('categoryRooms').classList.add('hidden');
            }
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            
            if (section === 'main') document.querySelectorAll('.nav-item')[0].classList.add('active');
            if (section === 'categories') document.querySelectorAll('.nav-item')[1].classList.add('active');
            if (section === 'create') document.querySelectorAll('.nav-item')[2].classList.add('active');
            if (section === 'private') document.querySelectorAll('.nav-item')[3].classList.add('active');
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && currentSection === 'chat' && document.activeElement === document.getElementById('messageInput')) {
                sendMessage();
            }
        });

        // Инициализация
        tg.ready();
        loadRooms();
        
        // Загружаем комнаты каждые 30 секунд (для обновления)
        setInterval(loadRooms, 30000);
    </script>
</body>
</html>
