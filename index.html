
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анонимный чат с GPT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #fff);
            min-height: 100vh;
            padding: 16px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--tg-theme-text-color, #fff);
            text-align: center;
        }
        
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .room-card {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid var(--tg-theme-hint-color, #0f3460);
            text-align: center;
        }
        
        .room-card:hover {
            transform: scale(1.02);
        }
        
        .room-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .room-name {
            font-weight: bold;
            margin-bottom: 4px;
            color: var(--tg-theme-text-color, #fff);
        }
        
        .room-users {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #aaa);
        }
        
        .room-description {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #888);
            margin-top: 8px;
        }
        
        .button {
            background: var(--tg-theme-button-color, #4CAF50);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            transition: opacity 0.2s;
        }
        
        .button:hover {
            opacity: 0.9;
        }
        
        .button.secondary {
            background: var(--tg-theme-secondary-bg-color, #0f3460);
        }
        
        .chat-container {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            border-radius: 12px;
            padding: 16px;
            min-height: 300px;
            margin-bottom: 16px;
        }
        
        .message {
            margin-bottom: 12px;
            padding: 8px 12px;
            background: var(--tg-theme-bg-color, #1a1a2e);
            border-radius: 8px;
            max-width: 80%;
        }
        
        .message.own {
            margin-left: auto;
            background: var(--tg-theme-button-color, #4CAF50);
            color: var(--tg-theme-button-text-color, #fff);
        }
        
        .message-header {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #aaa);
            margin-bottom: 4px;
        }
        
        .message-text {
            word-break: break-word;
        }
        
        .input-area {
            display: flex;
            gap: 8px;
            position: sticky;
            bottom: 16px;
            background: var(--tg-theme-bg-color, #1a1a2e);
            padding: 8px;
            border-radius: 8px;
        }
        
        .message-input {
            flex: 1;
            background: var(--tg-theme-secondary-bg-color, #16213e);
            color: var(--tg-theme-text-color, #fff);
            border: 1px solid var(--tg-theme-hint-color, #0f3460);
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
        }
        
        .send-button {
            background: var(--tg-theme-button-color, #4CAF50);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .back-button {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--tg-theme-bg-color, #1a1a2e);
            padding: 8px;
            margin-bottom: 8px;
        }
        
        .hidden {
            display: none;
        }
        
        .status {
            text-align: center;
            color: var(--tg-theme-hint-color, #888);
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- ЭКРАН ЗАГРУЗКИ -->
        <div id="loading" class="status">
            ⏳ Загрузка...
        </div>
        
        <!-- ГЛАВНОЕ МЕНЮ (ЛОББИ) -->
        <div id="lobby" class="hidden">
            <h1>🏠 Выбери комнату</h1>
            <button class="button secondary" id="randomBtn">🎲 Случайный собеседник</button>
            <div class="rooms-grid" id="roomsGrid"></div>
        </div>
        
        <!-- КОМНАТА ЧАТА -->
        <div id="chatRoom" class="hidden">
            <div class="back-button">
                <button class="button secondary" id="backToLobbyBtn">← К комнатам</button>
            </div>
            <h1 id="roomTitle">Чат</h1>
            <div class="chat-container" id="messages"></div>
            <div class="input-area">
                <input type="text" id="messageInput" class="message-input" placeholder="Сообщение...">
                <button class="send-button" id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран
        tg.enableClosingConfirmation(); // Спрашиваем при закрытии
        
        // Данные пользователя
        let userId = tg.initDataUnsafe?.user?.id || Math.floor(Math.random() * 1000000);
        let userName = tg.initDataUnsafe?.user?.first_name || 'User';
        
        // Состояние приложения
        let currentRoom = null;
        let rooms = {};
        let ws = null;
        
        // Элементы DOM
        const loadingEl = document.getElementById('loading');
        const lobbyEl = document.getElementById('lobby');
        const chatRoomEl = document.getElementById('chatRoom');
        const roomsGrid = document.getElementById('roomsGrid');
        const roomTitle = document.getElementById('roomTitle');
        const messagesEl = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const randomBtn = document.getElementById('randomBtn');
        const backToLobbyBtn = document.getElementById('backToLobbyBtn');
        
        // Загружаем список комнат
        async function loadRooms() {
            try {
                // Здесь должен быть запрос к вашему бэкенду
                // Пока используем тестовые данные
                rooms = {
                    'philosophy': { name: '📚 Философия', users: 5, icon: '🤔', description: 'Обсуждаем смысл жизни' },
                    'politics': { name: '🏛️ Политика', users: 3, icon: '⚖️', description: 'Политические дискуссии' },
                    'chat': { name: '💬 Общение', users: 8, icon: '🗣️', description: 'Просто поболтать' },
                    'flirt': { name: '💕 Вирт', users: 2, icon: '💋', description: 'Для флирта' },
                    'sport': { name: '⚽ Спорт', users: 4, icon: '⚽', description: 'Спортивные баталии' }
                };
                
                renderRooms();
                loadingEl.classList.add('hidden');
                lobbyEl.classList.remove('hidden');
            } catch (error) {
                console.error('Error loading rooms:', error);
                loadingEl.textContent = '❌ Ошибка загрузки';
            }
        }
        
        // Отрисовка комнат
        function renderRooms() {
            roomsGrid.innerHTML = '';
            
            for (let [id, room] of Object.entries(rooms)) {
                const card = document.createElement('div');
                card.className = 'room-card';
                card.onclick = () => joinRoom(id);
                
                card.innerHTML = `
                    <div class="room-icon">${room.icon || '🏠'}</div>
                    <div class="room-name">${room.name}</div>
                    <div class="room-users">👥 ${room.users || 0} чел</div>
                    <div class="room-description">${room.description || ''}</div>
                `;
                
                roomsGrid.appendChild(card);
            }
        }
        
        // Присоединение к комнате
        function joinRoom(roomId) {
            currentRoom = roomId;
            roomTitle.textContent = rooms[roomId].name;
            
            lobbyEl.classList.add('hidden');
            chatRoomEl.classList.remove('hidden');
            
            // Здесь будет подключение к WebSocket для реального времени
            addMessage('system', `Вы вошли в ${rooms[roomId].name}`);
            
            // Имитация сообщений (для теста)
            setTimeout(() => {
                addMessage('User_123', 'Привет всем!');
            }, 1000);
        }
        
        // Добавление сообщения
        function addMessage(sender, text, isOwn = false) {
            const message = document.createElement('div');
            message.className = `message ${isOwn ? 'own' : ''}`;
            
            if (!isOwn) {
                const header = document.createElement('div');
                header.className = 'message-header';
                header.textContent = sender;
                message.appendChild(header);
            }
            
            const content = document.createElement('div');
            content.className = 'message-text';
            content.textContent = text;
            message.appendChild(content);
            
            messagesEl.appendChild(message);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }
        
        // Отправка сообщения
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentRoom) return;
            
            addMessage('Вы', text, true);
            messageInput.value = '';
            
            // Здесь будет отправка на сервер
            // Пока имитируем ответ
            if (text.startsWith('/ask')) {
                const query = text.replace('/ask', '').trim();
                addMessage('GPT', 'Думаю над вопросом...');
                setTimeout(() => {
                    addMessage('GPT', `Ответ на "${query}": Это очень интересный вопрос!`);
                }, 2000);
            }
        }
        
        // Случайный собеседник
        function randomSearch() {
            tg.showPopup({
                title: '🔍 Поиск',
                message: 'Ищем случайного собеседника...',
                buttons: [{type: 'close'}]
            });
            
            setTimeout(() => {
                tg.showPopup({
                    title: '✅ Найдено!',
                    message: 'Собеседник найден, комната создана',
                    buttons: [{type: 'ok'}]
                });
                
                // Создаем временную комнату
                rooms['random_' + Date.now()] = {
                    name: '🎲 Случайный чат',
                    users: 2,
                    icon: '🎲',
                    description: 'Временная комната'
                };
            }, 2000);
        }
        
        // Выход в лобби
        function backToLobby() {
            currentRoom = null;
            messagesEl.innerHTML = '';
            chatRoomEl.classList.add('hidden');
            lobbyEl.classList.remove('hidden');
        }
        
        // Обработчики событий
        sendBtn.onclick = sendMessage;
        messageInput.onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage();
        };
        
        randomBtn.onclick = randomSearch;
        backToLobbyBtn.onclick = backToLobby;
        
        // Инициализация
        tg.ready();
        loadRooms();
        
        // Темная тема Telegram
        document.body.style.background = tg.themeParams.bg_color || '#1a1a2e';
    </script>
</body>
</html>
