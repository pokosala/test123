
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>ТЕСТ КНОПКИ</h1>
    
    <button onclick="sendTest()" style="padding: 20px; font-size: 24px;"> 
        🔴 НАЖМИ МЕНЯ
    </button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function sendTest() {
            console.log("Кнопка нажата!");
            
            // Самое простое сообщение
            tg.sendData("test");
            
            alert("Отправлено!");
        }
    </script>
</body>
</html>
