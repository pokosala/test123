
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: system-ui; margin: 0; padding: 16px; background: #0a0c10; color: white; }
        .room { background: #16181c; padding: 16px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; }
        .room:hover { background: #1e2228; }
        .chat { display: flex; flex-direction: column; height: 80vh; }
        .messages { flex: 1; overflow-y: auto; padding: 16px; background: #16181c; border-radius: 12px; margin-bottom: 12px; }
        .message { margin-bottom: 8px; padding: 8px 12px; background: #0a0c10; border-radius: 8px; max-width: 80%; }
        .message.own { margin-left: auto; background: #2b6bff; }
        .input-area { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; background: #16181c; border: none; border-radius: 8px; color: white; }
        button { padding: 12px 20px; background: #2b6bff; border: none; border-radius: 8px; color: white; cursor: pointer; }
        .back { background: #8e44ad; }
        .hidden { display: none; }
        h2 { margin-top: 0; }
    </style>
</head>
<body>
    <div id="mainMenu">
        <h1>🤖 Чат-форум</h1>
        <button onclick="createRoom()" style="width:100%; margin-bottom:12px;">➕ СОЗДАТЬ КОМНАТУ</button>
        <button onclick="randomSearch()" style="width:100%; margin-bottom:20px; background:#8e44ad;">🎲 СЛУЧАЙНЫЙ ПОИСК</button>
        <div id="roomsList"></div>
    </div>

    <div id="chatRoom" class="hidden">
        <button onclick="leaveRoom()" class="back">← НАЗАД</button>
        <h2 id="roomTitle"></h2>
        <div class="chat">
            <div class="messages" id="messages"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Сообщение...">
                <button onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let currentRoom = null;
        let roomsList = [];

        // Обработка сообщений от бота
        Telegram.WebApp.onEvent('message', function(event) {
            let data = JSON.parse(event.data);
            
            if (data.action === 'room_created') {
                currentRoom = data.room_id;
                enterRoom(currentRoom);
            }
            
            if (data.action === 'room_joined') {
                currentRoom = data.room_id;
                enterRoom(currentRoom);
            }
            
            if (data.action === 'found') {
                currentRoom = data.room_id;
                enterRoom(currentRoom);
            }
            
            if (data.action === 'timeout') {
                alert('⏰ Время вышло. Попробуй еще раз.');
            }
        });

        function createRoom() {
            tg.sendData(JSON.stringify({action: 'create_room'}));
        }

        function randomSearch() {
            tg.sendData(JSON.stringify({action: 'random_search'}));
        }

        function enterRoom(roomId) {
            currentRoom = roomId;
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('chatRoom').classList.remove('hidden');
            document.getElementById('roomTitle').textContent = 'Комната ' + roomId;
            document.getElementById('messages').innerHTML = '';
        }

        function sendMessage() {
            let input = document.getElementById('messageInput');
            let text = input.value.trim();
            if (!text || !currentRoom) return;
            
            let msgDiv = document.createElement('div');
            msgDiv.className = 'message own';
            msgDiv.textContent = text;
            document.getElementById('messages').appendChild(msgDiv);
            
            tg.sendData(JSON.stringify({
                action: 'send_message',
                room_id: currentRoom,
                text: text
            }));
            
            input.value = '';
        }

        function leaveRoom() {
            if (currentRoom) {
                tg.sendData(JSON.stringify({
                    action: 'leave_room',
                    room_id: currentRoom
                }));
                currentRoom = null;
            }
            document.getElementById('mainMenu').classList.remove('hidden');
            document.getElementById('chatRoom').classList.add('hidden');
        }
    </script>
</body>
</html>
